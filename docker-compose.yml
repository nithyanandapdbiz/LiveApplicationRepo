version: '3.8'

services:
  # Backend API
  api:
    build: ./api
    container_name: ecommerce-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
    volumes:
      - ./api:/app
      - /app/node_modules
    restart: unless-stopped

  # Frontend (optional - for full stack deployment)
  web:
    build:
      context: ./automation-poc
      dockerfile: Dockerfile
    container_name: ecommerce-web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:5000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_node_modules:
