# .github/workflows/deploy.yml
# Combined pipeline:
#   - aaf-scan: triggers AAF Agentic QA Platform dev-change analysis (advisory, non-blocking).
#               Skips automatically if AAF_PLATFORM_URL variable is not configured.
#   - build:    builds the React app (project lives in automation-poc/).
#   - deploy:   deploys built artifact to GitHub Pages.

name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: AAF Dev-Change Scan
  # Advisory — runs on every push and PR, never blocks merge.
  # Skipped automatically when AAF_PLATFORM_URL is not configured.
  # ============================================================
  aaf-scan:
    name: AAF Dev-Change Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Check AAF configuration
        id: check
        run: |
          if [ -z "${{ vars.AAF_PLATFORM_URL }}" ]; then
            echo "AAF_PLATFORM_URL is not set — skipping AAF scan."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine SHA range
        if: steps.check.outputs.configured == 'true'
        id: shas
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger AAF dev-change pipeline
        if: steps.check.outputs.configured == 'true'
        id: trigger
        run: |
          response=$(curl -sS -X POST \
            "${{ vars.AAF_PLATFORM_URL }}/api/dev-change/analyse" \
            -H "Authorization: Bearer ${{ secrets.AAF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "baseSha":  "${{ steps.shas.outputs.base }}",
              "headSha":  "${{ steps.shas.outputs.head }}",
              "repo":     "${{ github.repository }}",
              "prNumber": "${{ github.event.pull_request.number }}",
              "branch":   "${{ github.ref_name }}",
              "actor":    "${{ github.actor }}"
            }')
          echo "Response: $response"
          job_id=$(echo "$response" | grep -o '"jobId":"[^"]*"' | cut -d'"' -f4)
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"

      - name: Comment on PR with tracking link
        if: |
          steps.check.outputs.configured == 'true' &&
          github.event_name == 'pull_request' &&
          steps.trigger.outputs.job_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const jobId = '${{ steps.trigger.outputs.job_id }}';
            const url = '${{ vars.AAF_PLATFORM_URL }}/api/dev-change/jobs/' + jobId;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔍 **AAF Dev-Change scan triggered**\n\n` +
                    `Job ID: \`${jobId}\`\n` +
                    `Status: [View progress](${url})\n\n` +
                    `Results will be posted as a follow-up comment when the run completes (~2-5 min).`
            });

  # ============================================================
  # Job 2: Build the React app
  # Runs only on push to main. Project lives in automation-poc/.
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: automation-poc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: automation-poc/dist

  # ============================================================
  # Job 3: Deploy to GitHub Pages
  # ============================================================
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
