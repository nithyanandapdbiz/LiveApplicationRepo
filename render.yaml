services:
  - type: web
    name: ecommerce-api
    env: node
    region: oregon
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://nithyanandapdbiz.github.io
